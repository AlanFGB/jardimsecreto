<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPlanta - Postagens</title>
    <style>
        /* CSS BÁSICO para facilitar a leitura */
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #38761d; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #38761d; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #6aa84f; }
        .postagem { border: 1px solid #ccc; padding: 15px; margin-top: 10px; border-radius: 4px; background-color: #e6ffe6; }
        .coordenadas { font-size: 0.9em; color: #555; margin-top: 5px; }
        .secao-planta { margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>GeoPlanta - Novo Post</h1>

    <div class="coordenadas">
        **Sua Localização:** <span id="localizacaoStatus">Obtendo...</span>
        <input type="hidden" id="latitude" value="">
        <input type="hidden" id="longitude" value="">
    </div>

    <form id="formPostagem">
        <div class="secao-planta">
            <h2>1. Informações da Planta</h2>
            <label for="nomePlanta">Nome Comum:</label>
            <input type="text" id="nomePlanta" required>
            
            <label for="especie">Espécie/Nome Científico:</label>
            <input type="text" id="especie">
            
            <label for="imagemUrl">Link/URL da Imagem:</label>
            <input type="text" id="imagemUrl">
        </div>

        <div class="secao-planta">
            <h2>2. Saúde da Planta</h2>
            <label for="statusSaude">Status Geral (Ex: Ótimo, Atenção, Doente):</label>
            <input type="text" id="statusSaude" required>
            
            <label for="notasSaude">Notas sobre a Saúde (Descrição do problema ou cuidado):</label>
            <textarea id="notasSaude" rows="4"></textarea>
        </div>

        <button type="submit">Postar Planta (Salvar)</button>
    </form>

    <hr>

    <h2>Postagens Salvas</h2>
    <div id="listaPostagens">
        <p>Nenhuma postagem salva localmente.</p>
    </div>

</div>

<script>
    // #################################################
    // # DOCUMENTAÇÃO E LÓGICA JAVASCRIPT
    // #################################################

    // 1. Variáveis globais para os elementos da página
    const latitudeInput = document.getElementById('latitude');
    const longitudeInput = document.getElementById('longitude');
    const localizacaoStatus = document.getElementById('localizacaoStatus');
    const formPostagem = document.getElementById('formPostagem');
    const listaPostagensDiv = document.getElementById('listaPostagens');
    
    // Chave que usaremos para salvar no localStorage
    const STORAGE_KEY = 'geoPlantaPosts'; 

    // #################################################
    // 2. FUNÇÃO: CAPTURAR GEOLOCALIZAÇÃO
    // #################################################
    function getLocalizacao() {
        // Verifica se o navegador suporta a API de Geolocalização
        if ('geolocation' in navigator) {
            localizacaoStatus.textContent = 'Aguardando permissão...';
            
            // navigator.geolocation.getCurrentPosition tenta obter a posição atual
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // SUCESSO: Posição obtida com sucesso
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Armazena nos campos ocultos (hidden) do formulário
                    latitudeInput.value = lat;
                    longitudeInput.value = lon;
                    
                    localizacaoStatus.textContent = `Latitude: ${lat.toFixed(4)}, Longitude: ${lon.toFixed(4)}`;
                },
                (error) => {
                    // ERRO: O usuário negou ou houve outro problema
                    console.error('Erro ao obter localização:', error);
                    localizacaoStatus.textContent = 'Localização negada ou indisponível.';
                    latitudeInput.value = 'N/A';
                    longitudeInput.value = 'N/A';
                }
            );
        } else {
            // Navegador não tem suporte
            localizacaoStatus.textContent = 'Geolocalização não suportada neste navegador.';
            latitudeInput.value = 'N/A';
            longitudeInput.value = 'N/A';
        }
    }

    // #################################################
    // 3. FUNÇÃO: SALVAR POSTAGEM
    // #################################################
    function salvarPostagem(event) {
        event.preventDefault(); // Impede o envio padrão do formulário (que recarrega a página)

        // Cria um objeto (um 'post') com os dados do formulário
        const novaPostagem = {
            id: Date.now(), // ID único baseado no timestamp (data/hora)
            data: new Date().toLocaleString(),
            // Dados da Geolocalização
            latitude: latitudeInput.value,
            longitude: longitudeInput.value,
            // Dados da Planta
            nome: document.getElementById('nomePlanta').value,
            especie: document.getElementById('especie').value,
            imagemUrl: document.getElementById('imagemUrl').value,
            // Dados de Saúde
            statusSaude: document.getElementById('statusSaude').value,
            notasSaude: document.getElementById('notasSaude').value,
        };

        // 3.1. Obter posts existentes do localStorage
        const postsJson = localStorage.getItem(STORAGE_KEY);
        // Transforma o texto JSON em um Array de JavaScript. Se for nulo, cria um array vazio []
        let posts = postsJson ? JSON.parse(postsJson) : []; 
        
        // 3.2. Adicionar o novo post
        posts.push(novaPostagem);
        
        // 3.3. Salvar o Array atualizado de volta no localStorage (transforma em texto JSON)
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));

        // 3.4. Limpar o formulário e atualizar a lista
        formPostagem.reset();
        exibirPostagens();
        
        // Mensagem de sucesso (opcional)
        alert('Postagem da planta salva com sucesso!');
    }

    // #################################################
    // 4. FUNÇÃO: EXIBIR POSTAGENS SALVAS
    // #################################################
    function exibirPostagens() {
        // Obtém e converte as postagens salvas
        const postsJson = localStorage.getItem(STORAGE_KEY);
        const posts = postsJson ? JSON.parse(postsJson) : []; 

        // Limpa a lista atual
        listaPostagensDiv.innerHTML = ''; 

        if (posts.length === 0) {
            listaPostagensDiv.innerHTML = '<p>Nenhuma postagem salva localmente.</p>';
            return; // Encerra a função
        }

        // Loop para criar um elemento HTML para cada postagem
        posts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'postagem';
            div.innerHTML = `
                **Data/Hora:** ${post.data}
                <div class="coordenadas">
                    **Localização:** Lat: ${post.latitude}, Lon: ${post.longitude}
                </div>
                <h3>${post.nome} (${post.especie || 'N/A'})</h3>
                <p><strong>Status de Saúde:</strong> ${post.statusSaude}</p>
                <p><strong>Notas:</strong> ${post.notasSaude}</p>
                ${post.imagemUrl ? `<img src="${post.imagemUrl}" alt="Imagem da Planta" style="max-width:100%; height:auto; margin-top: 10px;">` : ''}
                <hr>
            `;
            listaPostagensDiv.appendChild(div);
        });
    }

    // #################################################
    // 5. INICIALIZAÇÃO DA APLICAÇÃO
    // #################################################
    
    // Adiciona um "ouvinte" ao formulário para executar a função salvarPostagem no 'submit'
    formPostagem.addEventListener('submit', salvarPostagem);

    // Quando a página carrega, faz 2 coisas:
    document.addEventListener('DOMContentLoaded', () => {
        // Tenta obter a localização do usuário
        getLocalizacao();
        // Exibe qualquer postagem salva de uma sessão anterior
        exibirPostagens();
    });

</script>
</body>
</html>
